<!DOCTYPE html>
<html lang="pt-br" x-data="crmApp()" :class="{ 'dark': isDarkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EvoCRM SaaS | Igor Lima</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: {
                    colors: {
                        panel: { light: '#FFFFFF', dark: '#0f172a' },
                        bg: { light: '#f8fafc', dark: '#020617' },
                        wa: {
                            header: { light: '#f0f2f5', dark: '#202c33' },
                            bg: { light: '#efeae2', dark: '#0b141a' },
                            msgIn: { light: '#ffffff', dark: '#202c33' },
                            msgOut: { light: '#d9fdd3', dark: '#005c4b' },
                            text: { light: '#111b21', dark: '#e9edef' },
                            sub: { light: '#667781', dark: '#8696a0' }
                        }
                    }
                } 
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <style>
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-pattern { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236366f1' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2v-4h4v-2H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
        .bg-chat-pattern { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; opacity: 0.6; }
        .dark .bg-chat-pattern { opacity: 0.05; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 antialiased font-sans overflow-hidden bg-pattern">

    <div x-show="appState === 'auth'" class="fixed inset-0 flex items-center justify-center z-[500] bg-slate-50 dark:bg-slate-950 p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 md:p-10 text-center border dark:border-slate-800">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-lg mx-auto mb-6"><i data-lucide="zap" class="text-white w-10 h-10"></i></div>
            <h1 class="font-black text-3xl dark:text-white mb-2">EvoCRM <span class="text-indigo-500">SaaS</span></h1>
            <p class="text-sm text-slate-500 mb-8 font-medium">Digite o nome da instância para conectar.</p>
            
            <input type="text" x-model="loginInput" placeholder="Ex: igor_solar" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl py-4 px-5 text-lg font-bold mb-4 text-center outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            
            <button @click="autoProvision()" :disabled="isLoading" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                <span x-show="!isLoading">Provisionar e Entrar</span>
                <span x-show="isLoading" class="animate-spin"><i data-lucide="loader"></i></span>
            </button>
            <p class="text-[10px] text-slate-400 mt-6 uppercase font-bold tracking-widest text-center">Desenvolvedor: Igor Lima</p>
        </div>
    </div>

    <div x-show="appState === 'crm'" class="flex h-screen w-full relative">
        <aside class="w-64 border-r hidden md:flex flex-col bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800">
                <h1 class="font-black text-xl dark:text-white">EVO<span class="text-indigo-500">PRO</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase truncate" x-text="'@' + instanceName"></p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <template x-for="item in navItems">
                    <button @click="screen = item.id; setTimeout(() => lucide.createIcons(), 50);" :class="screen === item.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all">
                        <i :data-lucide="item.icon" class="w-4 h-4"></i> <span x-text="item.label"></span>
                    </button>
                </template>
            </nav>
            <div class="p-4 border-t border-slate-100 dark:border-slate-800 text-center">
                <button @click="logout()" class="w-full py-3 mb-4 bg-slate-100 dark:bg-slate-800 rounded-xl text-xs font-bold hover:text-red-500 transition-colors">Sair</button>
                <p class="text-[10px] font-black text-indigo-500">Igor Lima</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50 dark:bg-slate-950">
            <header class="h-16 px-8 flex items-center justify-between bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shrink-0">
                <h2 class="font-black text-xl dark:text-white uppercase tracking-tighter" x-text="navItems.find(i => i.id === screen)?.label"></h2>
                <button @click="isDarkMode = !isDarkMode" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-lg"><i :data-lucide="isDarkMode ? 'sun' : 'moon'" class="w-5 h-5"></i></button>
            </header>

            <div class="flex-1 overflow-auto p-4 md:p-8 no-scrollbar">
                
                <div x-show="screen === 'conexao'" class="max-w-xl mx-auto text-center space-y-6">
                    <div class="bg-white dark:bg-slate-900 p-10 rounded-[3rem] shadow-sm border border-slate-200 dark:border-slate-800">
                        <div x-show="qrStatus === 'connected'" class="space-y-4">
                            <div class="w-20 h-20 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto shadow-lg"><i data-lucide="check" class="w-10 h-10"></i></div>
                            <h3 class="text-2xl font-black dark:text-white">Conectado com Sucesso!</h3>
                            <button @click="disconnect()" class="px-6 py-3 bg-red-50 text-red-600 font-bold rounded-xl mt-4">Desconectar Número</button>
                        </div>

                        <div x-show="qrStatus !== 'connected'" class="space-y-6">
                            <div class="bg-white p-4 rounded-3xl inline-block shadow-xl border border-slate-100">
                                <template x-if="qrCodeImage"><img :src="qrCodeImage" class="w-64 h-64 object-contain rounded-xl"></template>
                                <template x-if="!qrCodeImage"><div class="w-64 h-64 flex flex-col items-center justify-center bg-slate-100 rounded-xl text-slate-300 animate-pulse"><i data-lucide="qr-code" class="w-12 h-12"></i><span>Buscando QR...</span></div></template>
                            </div>
                            <h3 class="text-xl font-black dark:text-white">Conectar WhatsApp</h3>
                            <p class="text-sm text-slate-500">Escaneie o código acima para ativar a instância.</p>
                        </div>
                    </div>
                </div>

                <div x-show="screen === 'chats'"> [Aba de Conversas Aqui] </div>
                <div x-show="screen === 'kanban'"> [Aba de Funil Aqui] </div>

            </div>
        </main>
    </div>

    <script>
        function crmApp() {
            return {
                // CONFIGURAÇÕES GLOBAIS - ATUALIZE AQUI
                EVO_URL: 'https://projeto-evolution-api.xtknqq.easypanel.host',
                ADMIN_API_KEY: '773C15E29974-4BA2-B003-3F697EC279AE',
                WEBHOOK_URL: 'https://qhnbisjogpdoyszpsucs.supabase.co/functions/v1/evolution',
                SB_URL: 'https://qhnbisjogpdoyszpsucs.supabase.co',
                SB_KEY: 'sb_publishable_3PAly_BCdvoldAzm1Y7SxQ_S3rp2QhQ',

                appState: 'auth', loginInput: '', instanceName: '', qrStatus: 'disconnected', 
                qrCodeImage: '', isDarkMode: true, isLoading: false, screen: 'conexao',
                navItems: [
                    { id: 'dash', label: 'Dashboard', icon: 'pie-chart' },
                    { id: 'kanban', label: 'Funil', icon: 'columns' },
                    { id: 'chats', label: 'Conversas', icon: 'message-circle' },
                    { id: 'conexao', label: 'Conexão', icon: 'smartphone' }
                ],
                columns: [{id:'novo_lead', name:'Triagem'}, {id:'atendimento', name:'Negócio'}, {id:'fechado', name:'Venda'}],

                async init() {
                    this.client = supabase.createClient(this.SB_URL, this.SB_KEY);
                    const saved = localStorage.getItem('evo_session');
                    if(saved) {
                        this.instanceName = JSON.parse(saved).name;
                        this.appState = 'crm';
                        this.startCRM();
                    }
                    lucide.createIcons();
                },

                // 🚀 PROVISIONAMENTO AUTOMÁTICO COM TRATAMENTO DE CORS
                async autoProvision() {
                    if(!this.loginInput.trim()) return;
                    this.isLoading = true;
                    const name = this.loginInput.trim().toLowerCase();

                    try {
                        // Tenta criar (Se já existir, a API apenas dará erro, que ignoramos)
                        await fetch(`${this.EVO_URL}/instance/create`, {
                            method: 'POST',
                            headers: { 'apikey': this.ADMIN_API_KEY, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ "instanceName": name, "qrcode": true })
                        }).catch(e => console.log("Instância talvez já exista"));

                        // Configura Webhook
                        await fetch(`${this.EVO_URL}/webhook/set/${name}`, {
                            method: 'POST',
                            headers: { 'apikey': this.ADMIN_API_KEY, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ "url": this.WEBHOOK_URL, "enabled": true, "events": ["MESSAGES_UPSERT"] })
                        });

                        this.instanceName = name;
                        localStorage.setItem('evo_session', JSON.stringify({ name: this.instanceName }));
                        this.appState = 'crm';
                        this.startCRM();
                    } catch(e) {
                        alert("Erro de CORS ou Servidor Offline. Verifique as configurações de ORIGIN no servidor.");
                    } finally { this.isLoading = false; }
                },

                async startCRM() {
                    this.checkConn();
                    setInterval(() => this.checkConn(), 10000);
                },

                async checkConn() {
                    if (this.appState !== 'crm') return;
                    try {
                        const res = await fetch(`${this.EVO_URL}/instance/connectionState/${this.instanceName}`, { 
                            headers: { 'apikey': this.ADMIN_API_KEY } 
                        });
                        const data = await res.json();
                        if (data?.instance?.state === 'open' || data?.state === 'open') {
                            this.qrStatus = 'connected';
                        } else {
                            this.qrStatus = 'qrcode';
                            this.getQR();
                        }
                    } catch(e) { console.log("Erro ao checar conexão"); }
                },

                async getQR() {
                    try {
                        const res = await fetch(`${this.EVO_URL}/instance/connect/${this.instanceName}`, { 
                            headers: { 'apikey': this.ADMIN_API_KEY } 
                        });
                        const data = await res.json();
                        let qr = data?.base64 || data?.qrcode?.base64;
                        if (qr) {
                            this.qrCodeImage = qr.startsWith('data') ? qr : 'data:image/png;base64,' + qr;
                        }
                    } catch(e) {}
                },

                async disconnect() {
                    if(!confirm("Desconectar?")) return;
                    await fetch(`${this.EVO_URL}/instance/logout/${this.instanceName}`, { 
                        method: 'DELETE', headers: { 'apikey': this.ADMIN_API_KEY } 
                    });
                    this.qrStatus = 'disconnected';
                    this.qrCodeImage = '';
                },

                logout() { localStorage.removeItem('evo_session'); location.reload(); }
            }
        }
    </script>
</body>
</html>
